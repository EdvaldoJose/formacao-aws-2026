name: CI

on:
  push:
    branches:
      - main
      - developer
      - production
  pull_request:
    branches:
      - main
      - developer
      - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: npm install || echo "sem package.json"

      - name: Rodar testes
        run: npm test || echo "sem testes"
